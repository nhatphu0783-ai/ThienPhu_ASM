<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f5f5;
        }

        header {
            background: #111;
            color: white;
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: gold;
        }

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
        }

        nav a:hover {
            color: gold;
        }

        .banner {
            background: url('https://images.unsplash.com/photo-1523275335684-37898b6baf30') center/cover;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            font-weight: bold;
        }

        .products {
            padding: 50px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .product {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            transition: 0.3s;
        }

        .product:hover {
            transform: scale(1.05);
        }

        .product img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .product h3 {
            margin: 10px 0;
        }

        .price {
            color: red;
            font-weight: bold;
        }

        button {
            background: black;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: gold;
            color: black;
        }

        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>⌚ Watch Store</h1>
    <nav>
        <a href="#">Trang chủ</a>
        <a href="#">Sản phẩm</a>
        <a href="#">Liên hệ</a>
    </nav>
</header>

<div class="banner">
    Đồng hồ cao cấp 2026
</div>

<section class="products">

    <div class="product">
        <img src="https://tse4.mm.bing.net/th/id/OIP.nuI-ay3b-qjnN78YImH2wwHaE7?w=2048&h=1365&rs=1&pid=ImgDetMain&o=7&rm=3">
        <h3>Rolex Submariner</h3>
        <p class="price">150.000.000đ</p>
        <button onclick="buy()">Mua ngay</button>
    </div>

    <div class="product">
        <img src="https://tse4.mm.bing.net/th/id/OIP.nuI-ay3b-qjnN78YImH2wwHaE7?rs=1&pid=ImgDetMain&o=7&rm=3">
        <h3>Omega Speedmaster</h3>
        <p class="price">120.000.000đ</p>
        <button onclick="buy()">Mua ngay</button>
    </div>

    <div class="product">
        <img src="https://down-vn.img.susercontent.com/file/4b12628c35aca7d74c865b8cefaae6d0">
        <h3>Casio G-Shock</h3>
        <p class="price">5.000.000đ</p>
        <button onclick="buy()">Mua ngay</button>
    </div>

</section>

<footer>
    © 2026 Watch Store | Thiết kế bởi bạn 😎
</footer>

<script>
    function buy() {
        alert("Cảm ơn bạn đã mua hàng!");
    }
</script>

</body>
</html>
